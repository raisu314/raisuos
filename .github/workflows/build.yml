name: Build RaisuOS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential nasm xorriso grub-pc-bin grub-common mtools curl
    
    - name: Build kernel
      run: make all CC=gcc LD=ld
    
    - name: Build kernel
      run: make all
    
    - name: Create ISO
      run: make iso
    
    - name: Upload ISO artifact
      uses: actions/upload-artifact@v4
      with:
        name: raisuos-iso
        path: build/raisuos.iso
    
    - name: Upload kernel binary
      uses: actions/upload-artifact@v4
      with:
        name: raisuos-kernel
        path: build/raisuos.bin
